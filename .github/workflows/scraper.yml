name: MH Exhibitions Scraper

on:
  schedule:
    - cron: '30 5 * * *'   # 11:00 AM IST = 05:30 UTC
    - cron: '30 11 * * *'  # 5:00 PM IST = 11:30 UTC
  workflow_dispatch:       # Keep manual "Run workflow" button too

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install requests pandas
      
      - name: Run scraper
        run: python scraper.py
      
      - name: Commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add exhibitions.csv
          git commit -m "Update MH exhibitions data $(date)" || exit 0
          git push
